<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launcher MC Silicon</title>
  <link rel="stylesheet" href="./styles/theme.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar card">
      <div>
        <h1>Launcher MC Silicon</h1>
        <p>Apple Silicon only · mods sob demanda</p>
      </div>
      <div class="status-row">
        <span id="statusBadge" class="badge"><span class="dot"></span><span id="statusText">…</span></span>
        <span id="playersText" class="muted"></span>
      </div>
      <button id="refreshBtn" class="btn">Atualizar</button>
    </header>

    <section class="card hero">
      <div>
        <h2>Pasta detectada</h2>
        <p id="modsDirPath" class="code">detectando…</p>
      </div>
      <div class="actions">
        <button id="playBtn" class="btn primary">▶ Jogar</button>
        <button id="installBtn" class="btn primary" disabled>Atualizar mods</button>
        <button id="openFolderBtn" class="btn">Abrir pasta</button>
      </div>
      <p id="playStatus" class="muted"></p>
      <p id="diffSummary" class="muted"></p>
    </section>

    <section id="progressWrap" class="card progress-card" style="display:none">
      <div class="progress-head">
        <span id="progressLabel">Baixando…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
    </section>

    <section class="card">
      <h2>Mods do servidor <small id="modCount"></small></h2>
      <div id="modGrid" class="mod-grid"></div>
    </section>
  </main>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="toast" class="toast"></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
