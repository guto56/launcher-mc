name: Build Nexus Launcher

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch: {}

env:
  FORGE_VERSION: "1.20.1-47.4.21"
  PRISM_VERSION: "11.0.3"
  JAVA_VERSION: "21.0.11"
  JAVA_BUILD: "10"

jobs:
  # ---------------------------------------------------------------------------
  # Prepare: usa recursos JÁ COMMITADOS no repo (jre/, prism/, minecraft/).
  # Apenas verifica existência e gera o patch OneSix do Forge.
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21 (para Forge installer)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verificar recursos embarcados
        run: |
          set -euo pipefail
          echo "=== Verificando JRE macOS ==="
          if [ -f "src-tauri/resources/jre/mac/Contents/Home/bin/java" ]; then
            echo "✓ JRE macOS encontrado"
          else
            echo "✗ JRE macOS NÃO encontrado - build falhará"
            exit 1
          fi
          
          echo "=== Verificando JRE Windows ==="
          if [ -f "src-tauri/resources/jre/win/bin/java.exe" ]; then
            echo "✓ JRE Windows encontrado"
          else
            echo "✗ JRE Windows NÃO encontrado - build falhará"
            exit 1
          fi
          
          echo "=== Verificando PrismLauncher macOS ==="
          if [ -f "src-tauri/resources/prism/mac/Prism Launcher.app/Contents/MacOS/prismlauncher" ]; then
            echo "✓ PrismLauncher macOS encontrado"
          else
            echo "✗ PrismLauncher macOS NÃO encontrado - build falhará"
            exit 1
          fi
          
          echo "=== Verificando PrismLauncher Windows ==="
          if [ -f "src-tauri/resources/prism/win/prismlauncher.exe" ]; then
            echo "✓ PrismLauncher Windows encontrado"
          else
            echo "✗ PrismLauncher Windows NÃO encontrado - build falhará"
            exit 1
          fi
          
          echo "=== Verificando Minecraft + Forge ==="
          if [ -f "src-tauri/resources/minecraft/versions/${FORGE_VERSION}/forge-${FORGE_VERSION}.jar" ]; then
            echo "✓ Forge universal.jar encontrado"
          else
            echo "✗ Forge universal.jar NÃO encontrado - build falhará"
            exit 1
          fi
          
          if [ -d "src-tauri/resources/minecraft/libraries" ] && [ -n "$(ls -A src-tauri/resources/minecraft/libraries)" ]; then
            echo "✓ Libraries do Forge encontradas"
          else
            echo "✗ Libraries do Forge NÃO encontradas - build falhará"
            exit 1
          fi

      - name: Gerar patch OneSix do Forge
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/forge-patch
          cat > /tmp/forge-patch.py << 'PYEOF'
import json, os
FORGE_VERSION = os.environ.get('FORGE_VERSION', '1.20.1-47.4.21')
patch = {
    'formatVersion': 1,
    'uid': 'net.minecraftforge',
    'version': FORGE_VERSION,
    'name': 'Forge',
    'jarMods': [{'path': f'versions/{FORGE_VERSION}/forge-{FORGE_VERSION}.jar'}],
    'mainClass': 'net.minecraftforge.fml.common.launcher.FMLTweaker',
    'libraries': [],
    'requires': [{'uid': 'net.minecraft', 'equals': '1.20.1'}],
}
with open('src-tauri/resources/forge-patch/net.minecraftforge.json', 'w') as f:
    json.dump(patch, f, indent=2)
print('OneSix patch gerado')
PYEOF
          python3 /tmp/forge-patch.py

      - name: Upload embedded resources (artifact para build jobs)
        uses: actions/upload-artifact@v4
        with:
          name: embedded-resources
          path: src-tauri/resources/

  # ---------------------------------------------------------------------------
  # builds consomem o artifact acima
  # ---------------------------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download embedded resources
        uses: actions/download-artifact@v4
        with:
          name: embedded-resources
          path: src-tauri/resources

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (macOS Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-mac-silicon-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: Build Windows (x64 .msi)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Download embedded resources
        uses: actions/download-artifact@v4
        with:
          name: embedded-resources
          path: src-tauri/resources

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (Windows)
        run: npm run tauri build
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*