name: Build Nexus Launcher

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

env:
  FORGE_VERSION: "1.20.1-47.4.21"
  PRISM_VERSION: "11.0.3"
  JAVA_TAG: "jdk-21.0.11+10"

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java (p/ asset stub)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Baixar JRE 21 Temurin (mac-aarch64 + win-x64)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/jre/mac src-tauri/resources/jre/win
          curl -fsSL "https://github.com/adoptium/temurin21-binaries/releases/download/${JAVA_TAG}/OpenJDK21U-jre_aarch64_mac_hotspot_21.0.11_10.tar.gz" -o /tmp/jre-mac.tar.gz
          tar -xzf /tmp/jre-mac.tar.gz -C src-tauri/resources/jre/mac --strip-components=1
          curl -fsSL "https://github.com/adoptium/temurin21-binaries/releases/download/${JAVA_TAG}/OpenJDK21U-jre_x64_windows_hotspot_21.0.11_10.zip" -o /tmp/jre-win.zip
          (cd src-tauri/resources/jre/win && unzip -q /tmp/jre-win.zip && mv */* . && rmdir */ 2>/dev/null || true)

      - name: Baixar PrismLauncher 11.0.3 portable (mac + win)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/prism/mac src-tauri/resources/prism/win
          curl -fsSL "https://github.com/PrismLauncher/PrismLauncher/releases/download/${PRISM_VERSION}/PrismLauncher-macOS-${PRISM_VERSION}.zip" -o /tmp/prism-mac.zip
          (cd src-tauri/resources/prism/mac && unzip -q /tmp/prism-mac.zip)
          curl -fsSL "https://github.com/PrismLauncher/PrismLauncher/releases/download/${PRISM_VERSION}/PrismLauncher-Windows-MinGW-w64-Portable-${PRISM_VERSION}.zip" -o /tmp/prism-win.zip
          (cd src-tauri/resources/prism/win && unzip -q /tmp/prism-win.zip && mv */* . 2>/dev/null || true)

      - name: Baixar Forge universal.jar + JSON de versão
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/minecraft/versions/${FORGE_VERSION}
          # Forge universal (jar principal) - Maven layout forge-*-universal.jar
          curl -fsSL "https://maven.minecraftforge.net/net/minecraftforge/forge/${FORGE_VERSION}/forge-${FORGE_VERSION}-universal.jar" -o /tmp/universal.jar
          cp /tmp/universal.jar src-tauri/resources/minecraft/versions/${FORGE_VERSION}/forge-${FORGE_VERSION}.jar
          # Patch OneSix mínimo (Prism baixa libraries via metadata)
          mkdir -p src-tauri/resources/forge-patch
          python3 -c "
import json,os
FORGE_VERSION = os.environ.get('FORGE_VERSION', '1.20.1-47.4.21')
patch = {
    'formatVersion': 1,
    'uid': 'net.minecraftforge',
    'version': FORGE_VERSION,
    'name': 'Forge',
    'jarMods': [{'path': f'versions/{FORGE_VERSION}/forge-{FORGE_VERSION}.jar'}],
    'mainClass': 'net.minecraftforge.fml.common.launcher.FMLTweaker',
    'libraries': [],
    'requires': [{'uid': 'net.minecraft', 'equals': '1.20.1'}],
}
with open('src-tauri/resources/forge-patch/net.minecraftforge.json', 'w') as f:
    json.dump(patch, f, indent=2)
print('Patch gerado')
"
          mkdir -p src-tauri/resources/minecraft/libraries

      - name: Commitar recursos (se houver mudanca)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src-tauri/resources
          git diff --cached --quiet || git commit -m "ci: recursos embarcados (JRE21+Prism+Forge ${FORGE_VERSION})"
          git push || echo "push sem mudanca"

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (macOS Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-mac-silicon-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: Build Windows (x64 .msi)
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust (MSVC x64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (Windows -> .msi)
        run: npm run tauri build
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*