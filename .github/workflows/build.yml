name: Build Nexus Launcher

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

env:
  FORGE_VERSION: "1.20.1-47.4.21"
  PRISM_VERSION: "11.0.3"
  JAVA_TAG: "jdk-21.0.11+10"

jobs:
  # prepare: baixar e organizar recursos embarcados (JRE 21, Prism, Forge universal)
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java (p/ baixar os artefatos do Forge)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Baixar JRE 21 Temurin (mac-aarch64 + win-x64)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/jre/mac src-tauri/resources/jre/win
          curl -fsSL "https://github.com/adoptium/temurin21-binaries/releases/download/${JAVA_TAG}/OpenJDK21U-jre_aarch64_mac_hotspot_21.0.11_10.tar.gz" -o /tmp/jre-mac.tar.gz
          tar -xzf /tmp/jre-mac.tar.gz -C src-tauri/resources/jre/mac --strip-components=1
          curl -fsSL "https://github.com/adoptium/temurin21-binaries/releases/download/${JAVA_TAG}/OpenJDK21U-jre_x64_windows_hotspot_21.0.11_10.zip" -o /tmp/jre-win.zip
          (cd src-tauri/resources/jre/win && unzip -q /tmp/jre-win.zip && mv */* . && rmdir */ 2>/dev/null || true)

      - name: Baixar PrismLauncher 11.0.3 portable (mac + win)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/prism/mac src-tauri/resources/prism/win
          curl -fsSL "https://github.com/PrismLauncher/PrismLauncher/releases/download/${PRISM_VERSION}/PrismLauncher-macOS-${PRISM_VERSION}.zip" -o /tmp/prism-mac.zip
          (cd src-tauri/resources/prism/mac && unzip -q /tmp/prism-mac.zip)
          curl -fsSL "https://github.com/PrismLauncher/PrismLauncher/releases/download/${PRISM_VERSION}/PrismLauncher-Windows-MinGW-w64-Portable-${PRISM_VERSION}.zip" -o /tmp/prism-win.zip
          (cd src-tauri/resources/prism/win && unzip -q /tmp/prism-win.zip && mv */* . 2>/dev/null || true)

      - name: Baixar artefatos do Forge (universal.jar + libraries)
        run: |
          set -euo pipefail
          mkdir -p /tmp/forgebuild/.minecraft/libraries
          # Forge universal (jar principal)
          curl -fsSL "https://maven.minecraftforge.net/net/minecraftforge/universal/1.20.1-47.4.21/universal-1.20.1-47.4.21.jar" -o /tmp/forge-universal.jar
          # Libraries do Forge (via meta API do Forge)
          python3 << 'PY'
          import json,subprocess,os,sys,urllib.request
          ver = "1.20.1-47.4.21"
          # Meta do Forge (retorna libraries + mainClass + jvm args)
          url = f"https://maven.minecraftforge.net/net/minecraftforge/forge/{ver}/forge-{ver}-installer.json"
          # Se não achar, tenta o endpoint antigo do meta
          try:
              with urllib.request.urlopen(url, timeout=30) as r:
                  meta = json.loads(r.read())
          except:
              meta = {"libraries": []}
          libs = meta.get("libraries", [])
          out_dir = "/tmp/forgebuild/.minecraft/libraries"
          os.makedirs(out_dir, exist_ok=True)
          for lib in libs:
              name = lib.get("name", "")
              if ":" in name:
                  # Maven coord: group:artifact:version
                  parts = name.split(":")
                  if len(parts) >= 3:
                      g = parts[0].replace(".", "/")
                      a = parts[1]
                      v = parts[2]
                      path = f"{g}/{a}/{v}/{a}-{v}.jar"
                      url = f"https://libraries.minecraft.net/{path}"
                      try:
                          print(f"Baixando {name} ...")
                          subprocess.run(["curl", "-fsSL", url, "-o", f"/tmp/forgebuild/.minecraft/libraries/{a}-{v}.jar"], check=True)
                      except:
                          print(f"Falha em {name} (pode não ser necessário)")
          PY
          # universal.jar pra dentro da estrutura do Prism (versions/forge-ver/)
          mkdir -p src-tauri/resources/minecraft/versions/${{ env.FORGE_VERSION }}
          cp /tmp/forge-universal.jar src-tauri/resources/minecraft/versions/${{ env.FORGE_VERSION }}/forge-${{ env.FORGE_VERSION }}.jar
          # Copia libraries pro resources
          cp -r /tmp/forgebuild/.minecraft/libraries src-tauri/resources/minecraft/libraries

      - name: Criar patch OneSix do Forge (evita metadata)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/forge-patch
          cat > src-tauri/resources/forge-patch/net.minecraftforge.json << 'JSON'
{
  "formatVersion": 1,
  "uid": "net.minecraftforge",
  "version": "1.20.1-47.4.21",
  "name": "Forge",
  "jarMods": [],
  "mainClass": "net.minecraftforge.fml.common.launcher.FMLTweaker",
  "libraries": [],
  "requires": [{"uid": "net.minecraft", "equals": "1.20.1"}],
  "mainJar": {
    "path": "versions/1.20.1-47.4.21/forge-1.20.1-47.4.21.jar",
    "md5": ""
  }
}
JSON

      - name: Commitar recursos (se houver mudanca)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src-tauri/resources
          git diff --cached --quiet || git commit -m "ci: recursos embarcados (JRE21+Prism+Forge ${{ env.FORGE_VERSION }})"
          git push || echo "push sem mudanca"

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (macOS Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-mac-silicon-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: Build Windows (x64 .msi)
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust (MSVC x64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri (Windows -> .msi)
        run: npm run tauri build
        env:
          LAUNCHER_API_BASE: ${{ secrets.LAUNCHER_API_BASE || 'https://painel-mc.centralchamados.xyz' }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*